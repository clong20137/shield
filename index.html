<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISP App Portal</title>
    <style>
      :root {
        --navy: #1a365d;
        --navy-dark: #081421;
        --blue: #2563eb;
        --gold: #9c865c;
        --gold-light: #d7c59a;
        --white: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      @keyframes portal-card-enter {
        0% {
          opacity: 0;
          transform: translateY(22px) scale(0.985);
        }

        100% {
          opacity: 1;
          transform: none;
        }
      }

      @keyframes app-mark-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes app-image-sheen {
        0% {
          transform: translateX(-120%) rotate(16deg);
        }

        100% {
          transform: translateX(160%) rotate(16deg);
        }
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--white);
        background:
          linear-gradient(90deg, rgba(156, 134, 92, 0.16) 0 1px, transparent 1px 100%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0 1px, transparent 1px 100%),
          linear-gradient(135deg, var(--navy-dark), var(--navy) 54%, #0b1828);
        background-size: 96px 96px, 96px 96px, 100% 100%;
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
        padding: 30px;
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 14px;
      }

      .brand-logo {
        display: grid;
        width: 54px;
        height: 54px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      }

      .brand-logo img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .brand-title {
        margin: 0;
        font-size: 1.18rem;
        font-weight: 900;
        line-height: 1.1;
      }

      .brand-subtitle {
        margin: 4px 0 0;
        color: #bfdbfe;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .portal {
        display: grid;
        width: min(100%, 1160px);
        gap: 32px;
        align-self: center;
        justify-self: center;
        padding: 44px 0 24px;
      }

      .portal-title {
        margin: 0;
        font-size: clamp(2.8rem, 5.8vw, 5.6rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.94;
      }

      .portal-lead {
        max-width: 700px;
        margin: 18px 0 0;
        color: #dbeafe;
        font-size: clamp(1.02rem, 2vw, 1.22rem);
        line-height: 1.6;
      }

      .app-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .app-card {
        display: grid;
        min-height: 470px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(248, 250, 252, 0.96);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        color: #0f172a;
        animation: portal-card-enter 560ms cubic-bezier(0.18, 0.95, 0.24, 1) both;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      .app-card:nth-child(2) {
        animation-delay: 90ms;
      }

      .app-card:hover {
        border-color: rgba(215, 197, 154, 0.72);
        box-shadow: 0 34px 110px rgba(0, 0, 0, 0.42);
        transform: translateY(-5px);
      }

      .app-image {
        position: relative;
        display: grid;
        min-height: 275px;
        overflow: hidden;
        place-items: center;
        border-bottom: 1px solid #e2e8f0;
        background:
          linear-gradient(135deg, rgba(26, 54, 93, 0.96), rgba(16, 41, 72, 0.96)),
          linear-gradient(90deg, rgba(156, 134, 92, 0.2) 0 1px, transparent 1px 100%);
        background-size: 100% 100%, 42px 42px;
      }

      .app-image::after {
        position: absolute;
        top: -24%;
        bottom: -24%;
        width: 96px;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 44px rgba(255, 255, 255, 0.12);
        content: "";
        filter: blur(1px);
        transform: translateX(-120%) rotate(16deg);
      }

      .app-card:hover .app-image::after {
        animation: app-image-sheen 920ms ease;
      }

      .app-image img {
        width: min(54%, 220px);
        max-height: 220px;
        object-fit: contain;
        filter: drop-shadow(0 22px 44px rgba(0, 0, 0, 0.34));
        animation: app-mark-float 4.8s ease-in-out infinite;
        transition: transform 180ms ease;
      }

      .app-card:hover .app-image img,
      .app-card:hover .fleet-logo {
        transform: scale(1.04);
      }

      .fleet-image {
        background:
          linear-gradient(135deg, rgba(8, 20, 33, 0.98), rgba(37, 99, 235, 0.76)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 100%);
        background-size: 100% 100%, 42px 42px;
      }

      .fleet-logo {
        width: min(54%, 220px);
        aspect-ratio: 1;
        color: var(--gold-light);
        filter: drop-shadow(0 22px 54px rgba(0, 0, 0, 0.32));
        animation: app-mark-float 5.2s ease-in-out infinite;
        transition: transform 180ms ease;
      }

      .fleet-logo-ring {
        fill: rgba(255, 255, 255, 0.1);
        stroke: rgba(215, 197, 154, 0.72);
        stroke-width: 3;
      }

      .fleet-logo-road {
        fill: none;
        stroke: white;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 9;
      }

      .fleet-logo-lane {
        fill: none;
        stroke: var(--gold-light);
        stroke-linecap: round;
        stroke-width: 5;
      }

      .fleet-logo-text {
        fill: white;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 28px;
        font-weight: 950;
        letter-spacing: 0.06em;
      }

      .app-body {
        display: grid;
        gap: 18px;
        padding: 24px;
      }

      .app-name {
        margin: 0;
        color: var(--navy);
        font-size: 2rem;
        font-weight: 950;
        line-height: 1;
      }

      .app-text {
        margin: 0;
        color: #475569;
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .launch-button,
      .download-link {
        display: inline-flex;
        min-height: 50px;
        align-items: center;
        justify-content: center;
        gap: 9px;
        border-radius: 8px;
        font-weight: 900;
        text-align: center;
        text-decoration: none;
        transition:
          background 160ms ease,
          box-shadow 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      .launch-button svg,
      .download-link svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        stroke-width: 2.4;
      }

      .launch-button {
        background: var(--navy);
        color: white;
        box-shadow: 0 14px 28px rgba(26, 54, 93, 0.28);
      }

      .launch-button:hover {
        background: #102948;
        transform: translateY(-1px);
      }

      .download-link {
        border: 1px solid #8c774e;
        background: var(--gold);
        color: white;
        box-shadow: 0 14px 28px rgba(156, 134, 92, 0.25);
      }

      .download-link:hover {
        background: #806d49;
        transform: translateY(-1px);
      }

      .launch-button:focus,
      .download-link:focus {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }

      @media (max-width: 860px) {
        main {
          padding: 20px;
        }

        .portal {
          padding: 38px 0 16px;
        }

        .app-grid {
          grid-template-columns: 1fr;
        }

        .app-card {
          min-height: 0;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand" aria-label="ISP app portal">
        <span class="brand-logo">
          <img src="/shield/shield-splash-logo.png" alt="" />
        </span>
        <div>
          <p class="brand-title">ISP App Portal</p>
          <p class="brand-subtitle">Indiana State Police</p>
        </div>
      </header>

      <section class="portal">
        <div>
          <h1 class="portal-title">Select an app.</h1>
          <p class="portal-lead">
            Launch an installed desktop app or open a web-based agency workspace.
          </p>
        </div>

        <div class="app-grid" aria-label="Application launcher">
          <article class="app-card">
            <div class="app-image">
              <img src="/shield/shield-splash-logo.png" alt="SHIELD" />
            </div>
            <div class="app-body">
              <div>
                <h2 class="app-name">SHIELD</h2>
                <p class="app-text">Personnel workspace and daily operations tools.</p>
              </div>
              <div class="actions">
                <a class="launch-button" href="shield://open">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M5 12h14" />
                    <path d="m13 6 6 6-6 6" />
                  </svg>
                  <span>Launch</span>
                </a>
                <a class="download-link" href="/shield/downloads/Shield-Setup.exe" download>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M12 3v12" />
                    <path d="m7 10 5 5 5-5" />
                    <path d="M5 21h14" />
                  </svg>
                  <span>Download</span>
                </a>
              </div>
            </div>
          </article>

          <article class="app-card">
            <div class="app-image fleet-image">
              <svg class="fleet-logo" viewBox="0 0 220 220" role="img" aria-label="Fleet">
                <circle class="fleet-logo-ring" cx="110" cy="110" r="92" />
                <path class="fleet-logo-road" d="M63 150c20-11 31-26 35-46l12-55 12 55c4 20 15 35 35 46" />
                <path class="fleet-logo-lane" d="M110 72v21" />
                <path class="fleet-logo-lane" d="M110 115v24" />
                <path class="fleet-logo-lane" d="M76 156h68" />
                <text class="fleet-logo-text" x="110" y="184" text-anchor="middle">FLEET</text>
              </svg>
            </div>
            <div class="app-body">
              <div>
                <h2 class="app-name">Fleet</h2>
                <p class="app-text">Vehicle assignments, maintenance, mileage, and equipment.</p>
              </div>
              <div class="actions">
                <a class="launch-button" href="/fleet/">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M5 12h14" />
                    <path d="m13 6 6 6-6 6" />
                  </svg>
                  <span>Launch</span>
                </a>
                <a class="download-link" href="/fleet/">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                    <path d="M15 3h6v6" />
                    <path d="M10 14 21 3" />
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                  </svg>
                  <span>Open Web</span>
                </a>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
