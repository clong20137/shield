<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISP App Portal</title>
    <style>
      :root {
        --navy: #1a365d;
        --navy-dark: #081421;
        --blue: #2563eb;
        --gold: #9c865c;
        --gold-light: #d7c59a;
        --white: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--white);
        background:
          linear-gradient(90deg, rgba(156, 134, 92, 0.16) 0 1px, transparent 1px 100%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.07) 0 1px, transparent 1px 100%),
          linear-gradient(135deg, var(--navy-dark), var(--navy) 54%, #0b1828);
        background-size: 96px 96px, 96px 96px, 100% 100%;
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
        padding: 30px;
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 14px;
      }

      .brand-logo {
        display: grid;
        width: 54px;
        height: 54px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      }

      .brand-logo img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .brand-title {
        margin: 0;
        font-size: 1.18rem;
        font-weight: 900;
        line-height: 1.1;
      }

      .brand-subtitle {
        margin: 4px 0 0;
        color: #bfdbfe;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .portal {
        display: grid;
        width: min(100%, 1160px);
        gap: 32px;
        align-self: center;
        justify-self: center;
        padding: 44px 0 24px;
      }

      .portal-title {
        margin: 0;
        font-size: clamp(2.8rem, 5.8vw, 5.6rem);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.94;
      }

      .portal-lead {
        max-width: 700px;
        margin: 18px 0 0;
        color: #dbeafe;
        font-size: clamp(1.02rem, 2vw, 1.22rem);
        line-height: 1.6;
      }

      .app-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
      }

      .app-card {
        display: grid;
        min-height: 470px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(248, 250, 252, 0.96);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        color: #0f172a;
      }

      .app-image {
        display: grid;
        min-height: 275px;
        place-items: center;
        border-bottom: 1px solid #e2e8f0;
        background:
          linear-gradient(135deg, rgba(26, 54, 93, 0.96), rgba(16, 41, 72, 0.96)),
          linear-gradient(90deg, rgba(156, 134, 92, 0.2) 0 1px, transparent 1px 100%);
        background-size: 100% 100%, 42px 42px;
      }

      .app-image img {
        width: min(54%, 220px);
        max-height: 220px;
        object-fit: contain;
        filter: drop-shadow(0 22px 44px rgba(0, 0, 0, 0.34));
      }

      .fleet-image {
        position: relative;
        background:
          linear-gradient(135deg, rgba(8, 20, 33, 0.98), rgba(37, 99, 235, 0.76)),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 0 1px, transparent 1px 100%);
        background-size: 100% 100%, 42px 42px;
      }

      .fleet-monogram {
        display: grid;
        width: min(54%, 220px);
        aspect-ratio: 1;
        place-items: center;
        border: 2px solid rgba(215, 197, 154, 0.58);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        font-size: clamp(4rem, 9vw, 7rem);
        font-weight: 950;
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.3);
      }

      .app-body {
        display: grid;
        gap: 18px;
        padding: 24px;
      }

      .app-name {
        margin: 0;
        color: var(--navy);
        font-size: 2rem;
        font-weight: 950;
        line-height: 1;
      }

      .app-text {
        margin: 0;
        color: #475569;
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .launch-button,
      .download-link {
        display: inline-flex;
        min-height: 50px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-weight: 900;
        text-align: center;
        text-decoration: none;
      }

      .launch-button {
        background: var(--navy);
        color: white;
        box-shadow: 0 14px 28px rgba(26, 54, 93, 0.28);
      }

      .launch-button:hover {
        background: #102948;
      }

      .download-link {
        border: 1px solid rgba(156, 134, 92, 0.45);
        background: rgba(156, 134, 92, 0.1);
        color: var(--gold);
      }

      .download-link:hover {
        background: rgba(156, 134, 92, 0.16);
      }

      .launch-button:focus,
      .download-link:focus {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }

      @media (max-width: 860px) {
        main {
          padding: 20px;
        }

        .portal {
          padding: 38px 0 16px;
        }

        .app-grid {
          grid-template-columns: 1fr;
        }

        .app-card {
          min-height: 0;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="brand" aria-label="ISP app portal">
        <span class="brand-logo">
          <img src="/shield/shield-splash-logo.png" alt="" />
        </span>
        <div>
          <p class="brand-title">ISP App Portal</p>
          <p class="brand-subtitle">Indiana State Police</p>
        </div>
      </header>

      <section class="portal">
        <div>
          <h1 class="portal-title">Select an app.</h1>
          <p class="portal-lead">
            Launch an installed desktop app or open a web-based agency workspace.
          </p>
        </div>

        <div class="app-grid" aria-label="Application launcher">
          <article class="app-card">
            <div class="app-image">
              <img src="/shield/shield-splash-logo.png" alt="SHIELD" />
            </div>
            <div class="app-body">
              <div>
                <h2 class="app-name">SHIELD</h2>
                <p class="app-text">Personnel workspace and daily operations tools.</p>
              </div>
              <div class="actions">
                <a class="launch-button" href="shield://open">Launch</a>
                <a class="download-link" href="/shield/downloads/Shield-Setup.exe" download>
                  Download
                </a>
              </div>
            </div>
          </article>

          <article class="app-card">
            <div class="app-image fleet-image">
              <span class="fleet-monogram">FL</span>
            </div>
            <div class="app-body">
              <div>
                <h2 class="app-name">Fleet</h2>
                <p class="app-text">Vehicle assignments, maintenance, mileage, and equipment.</p>
              </div>
              <div class="actions">
                <a class="launch-button" href="/fleet/">Launch</a>
                <a class="download-link" href="/fleet/">Open Web</a>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
