<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%shield-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHIELD - Agency User Search & Reporting System</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        background: #f9fafb;
      }

      .initial-splash {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        background:
          radial-gradient(circle at center, rgba(156, 134, 92, 0.14), transparent 19rem),
          #f9fafb;
        color: #111827;
        font-family: Arial, sans-serif;
        padding: 2rem;
        text-align: center;
      }

      .initial-splash-mark {
        position: relative;
        width: 7.5rem;
        height: 7.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .initial-splash-mark::before {
        content: '';
        position: absolute;
        inset: 0.25rem;
        border: 2px solid rgba(156, 134, 92, 0.28);
        border-top-color: #9c865c;
        border-radius: 999px;
        animation: splash-ring 1.25s linear infinite;
      }

      .initial-splash-mark::after {
        content: '';
        position: absolute;
        inset: 1.2rem;
        z-index: 2;
        background: linear-gradient(115deg, transparent 18%, rgba(255, 255, 255, 0.72) 46%, transparent 72%);
        opacity: 0.68;
        transform: translateX(-150%) rotate(10deg);
        animation: splash-logo-shine 2.4s ease-in-out infinite;
        pointer-events: none;
      }

      .initial-splash-mark img {
        position: relative;
        z-index: 1;
        width: 5.75rem;
        height: 5.75rem;
        object-fit: contain;
        filter: drop-shadow(0 18px 28px rgba(15, 23, 42, 0.2));
        animation: splash-icon-pulse 1.8s ease-in-out infinite;
      }

      .initial-splash-kicker {
        margin: 0;
        color: #9c865c;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.22em;
      }

      .initial-splash h1 {
        margin: 0;
        font-size: clamp(1.65rem, 4vw, 2.35rem);
        line-height: 1.1;
      }

      .initial-splash-copy,
      .initial-splash-fallback {
        margin: 0;
        color: #4b5563;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .initial-splash-fallback {
        max-width: 32rem;
        opacity: 0;
        animation: splash-fallback 0.35s ease-out 7s forwards;
      }

      .initial-splash-progress {
        width: min(18rem, 72vw);
        height: 0.5rem;
        margin-top: 0.35rem;
        overflow: hidden;
        border: 1px solid rgba(156, 134, 92, 0.28);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08), 0 12px 24px rgba(15, 23, 42, 0.08);
      }

      .initial-splash-progress span {
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6f623f, #c3ad78, #9c865c);
        box-shadow: 0 0 18px rgba(156, 134, 92, 0.38);
        animation: splash-progress 1.65s ease-in-out infinite;
      }

      @keyframes splash-ring {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes splash-icon-pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.045);
        }
      }

      @keyframes splash-logo-shine {
        0%,
        24% {
          transform: translateX(-150%) rotate(10deg);
        }

        58%,
        100% {
          transform: translateX(150%) rotate(10deg);
        }
      }

      @keyframes splash-progress {
        0% {
          transform: translateX(-105%);
        }

        55% {
          transform: translateX(88%);
        }

        100% {
          transform: translateX(232%);
        }
      }

      @keyframes splash-fallback {
        to {
          opacity: 1;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #030712;
        }

        .initial-splash {
          background:
            radial-gradient(circle at center, rgba(156, 134, 92, 0.16), transparent 20rem),
            #030712;
          color: #f9fafb;
        }

        .initial-splash-progress {
          background: rgba(17, 24, 39, 0.82);
          box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.34), 0 16px 32px rgba(0, 0, 0, 0.28);
        }

        .initial-splash-copy,
        .initial-splash-fallback {
          color: #9ca3af;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .initial-splash-mark::before,
        .initial-splash-mark::after,
        .initial-splash-mark img,
        .initial-splash-progress span,
        .initial-splash-fallback {
          animation: none;
        }

        .initial-splash-progress span {
          width: 72%;
        }

        .initial-splash-fallback {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-splash" role="status" aria-live="polite">
        <div class="initial-splash-mark">
          <img src="%BASE_URL%shield-icon.png" alt="SHIELD" />
        </div>
        <p class="initial-splash-kicker">SHIELD</p>
        <h1>Loading SHIELD</h1>
        <p class="initial-splash-copy">Preparing your workspace...</p>
        <div class="initial-splash-progress" aria-hidden="true"><span></span></div>
        <p class="initial-splash-fallback">If this stays on screen, the frontend JavaScript did not load.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
