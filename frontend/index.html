<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%shield-icon.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%shield-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1d3f6f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Blueline" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Blueline</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        background: #f9fafb;
      }

      .initial-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        background:
          radial-gradient(circle at center, rgba(156, 134, 92, 0.14), transparent 19rem),
          #f9fafb;
        color: #111827;
        font-family: Arial, sans-serif;
        padding: 2rem;
        text-align: center;
        transition: opacity 420ms cubic-bezier(0.16, 1, 0.3, 1), transform 420ms cubic-bezier(0.16, 1, 0.3, 1), filter 420ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .initial-splash-exiting {
        opacity: 0;
        transform: scale(1.012);
        filter: blur(8px);
        pointer-events: none;
      }

      .initial-splash-mark {
        position: relative;
        width: 8.25rem;
        height: 8.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
      }

      .initial-splash-mark img {
        position: relative;
        z-index: 2;
        width: 5.65rem;
        height: 5.65rem;
        object-fit: contain;
        filter: drop-shadow(0 18px 28px rgba(15, 23, 42, 0.2));
        animation: splash-icon-pulse 1.8s ease-in-out infinite;
      }

      .initial-splash-kicker {
        margin: 0;
        color: #9c865c;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.22em;
      }

      .initial-splash h1 {
        margin: 0;
        font-size: clamp(1.65rem, 4vw, 2.35rem);
        line-height: 1.1;
      }

      .initial-splash-copy,
      .initial-splash-fallback {
        margin: 0;
        color: #4b5563;
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .initial-splash-fallback {
        max-width: 32rem;
        opacity: 0;
        animation: splash-fallback 0.35s ease-out 7s forwards;
      }

      .initial-splash-progress {
        width: min(18rem, 72vw);
        height: 0.5rem;
        margin-top: 0.35rem;
        overflow: hidden;
        border: 1px solid rgba(156, 134, 92, 0.28);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08), 0 12px 24px rgba(15, 23, 42, 0.08);
      }

      .initial-splash-progress span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #6f623f, #c3ad78, #9c865c);
        box-shadow: 0 0 18px rgba(156, 134, 92, 0.38);
        transform: scaleX(0);
        transform-origin: left center;
        animation: splash-progress 1.05s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes splash-ring {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes splash-icon-pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.045);
        }
      }

      @keyframes splash-progress {
        0% {
          transform: scaleX(0);
        }

        100% {
          transform: scaleX(1);
        }
      }

      @keyframes splash-fallback {
        to {
          opacity: 1;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #030712;
        }

        .initial-splash {
          background:
            radial-gradient(circle at center, rgba(156, 134, 92, 0.16), transparent 20rem),
            #030712;
          color: #f9fafb;
        }

        .initial-splash-progress {
          background: rgba(17, 24, 39, 0.82);
          box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.34), 0 16px 32px rgba(0, 0, 0, 0.28);
        }

        .initial-splash-copy,
        .initial-splash-fallback {
          color: #9ca3af;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .initial-splash-mark img,
        .initial-splash-progress span,
        .initial-splash-fallback {
          animation: none;
        }

        .initial-splash-progress span {
          transform: scaleX(1);
        }

        .initial-splash-fallback {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-splash" role="status" aria-live="polite">
        <div class="initial-splash-mark">
          <img src="%BASE_URL%shield-splash-logo.png" alt="Blueline" />
        </div>
        <p class="initial-splash-kicker">Blueline</p>
        <h1>Loading Blueline</h1>
        <p class="initial-splash-copy">Connecting to API...</p>
        <div class="initial-splash-progress" aria-hidden="true"><span></span></div>
        <p class="initial-splash-fallback">If this stays on screen, the frontend JavaScript did not load.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
