<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Fleet Badge App Logo</title>
  <desc id="desc">A navy and gold Fleet badge logo with a roadway mark and Fleet text.</desc>
  <defs>
    <linearGradient id="fleet-bg" x1="38" y1="28" x2="182" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a365d"/>
      <stop offset="1" stop-color="#081421"/>
    </linearGradient>
    <linearGradient id="fleet-gold" x1="47" y1="35" x2="176" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0dfb7"/>
      <stop offset="1" stop-color="#9c865c"/>
    </linearGradient>
    <filter id="fleet-shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <g filter="url(#fleet-shadow)">
    <circle cx="110" cy="110" r="96" fill="url(#fleet-bg)"/>
    <circle cx="110" cy="110" r="90" fill="#ffffff" fill-opacity="0.08" stroke="url(#fleet-gold)" stroke-width="4"/>
    <path d="M63 150c20-11 31-26 35-46l12-55 12 55c4 20 15 35 35 46" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="9"/>
    <path d="M110 72v21M110 115v24M76 156h68" fill="none" stroke="#d7c59a" stroke-linecap="round" stroke-width="5"/>
    <text x="110" y="184" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="2">FLEET</text>
  </g>
</svg>
